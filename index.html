<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启动中</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .progress-ring { width: 80px; height: 80px; }
        .progress-ring__circle { stroke: rgba(255,255,255,0.3); stroke-width: 4; fill: none; }
        .progress-ring__indicator {
            stroke: #fff; stroke-width: 4; stroke-linecap: round; fill: none;
            stroke-dasharray: 200; stroke-dashoffset: 200;
            animation: progress 1.5s ease-in-out infinite;
        }
        @keyframes progress { 0% { stroke-dashoffset: 200; } 50% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 200; } }
        .progress-ring { animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <svg class="progress-ring" viewBox="0 0 80 80">
        <circle class="progress-ring__circle" cx="40" cy="40" r="34" />
        <circle class="progress-ring__indicator" cx="40" cy="40" r="34" />
    </svg>
    <script>
        const isInitialLoad = !navigator.serviceWorker?.controller;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.error);
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data.type === 'ACTIVATED' && isInitialLoad) location.reload();
            });
        }
    </script>
</body>
</html>
