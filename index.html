<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悬置路由 MVP</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .nav { margin-bottom: 2rem; border-bottom: 1px solid #eaecef; padding-bottom: 1rem; }
        .loading { color: #666; font-style: italic; }
        .error { color: #d73a49; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">首页</a> | 
        <a href="/user/1">用户1</a> | 
        <a href="/user/2">用户2</a> | 
        <a href="/user/3">用户3</a>
    </div>
    <div id="app">
        <!-- 初始内容将由 SW 动态填充，但用户首次访问时 SW 尚未激活，会先看到这个 fallback -->
        <p>页面加载中，首次访问需稍等片刻（Service Worker 安装中）...</p>
    </div>

    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('SW registered: ', reg);
                    // 可选：发送消息动态更新路由（此处省略，使用预定义路由）
                })
                .catch(err => console.error('SW registration failed: ', err));
        } else {
            document.getElementById('app').innerHTML = '<p class="error">当前浏览器不支持 Service Worker，无法体验悬置路由。</p>';
        }
    </script>
</body>
</html>
